version: 1

codex:
  profiles:
    openai-official:
      name: OpenAI (official)
      provider_id: openai
      auth:
        # Recommended: pull from env instead of committing secrets.
        # Widex will cache the resolved key in auth.json (WIDEX_SAVED_API_KEYS),
        # so after one successful switch you can unset the env var.
        openai_api_key:
          env: OPENAI_API_KEY

    gemini-official:
      name: Gemini (official)
      provider_id: gemini
      auth:
        # Widex will cache the resolved key in auth.json (WIDEX_SAVED_API_KEYS),
        # so after one successful switch you can unset the env var.
        gemini_api_key:
          env: GEMINI_API_KEY

    grok-vectorengine:
      name: Grok (VectorEngine)
      provider_id: grok-vectorengine
      auth:
        # VectorEngine's Grok endpoint is OpenAI Chat Completions compatible, so use openai_api_key.
        # Widex will cache the resolved key in auth.json (WIDEX_SAVED_API_KEYS),
        # so after one successful switch you can unset the env var.
        openai_api_key:
          env: GROK_API_KEY

    grok-xai:
      name: Grok (xAI)
      provider_id: grok-xai
      auth:
        # xAI's Grok endpoint is OpenAI Chat Completions compatible, so use openai_api_key.
        # Widex will cache the resolved key in auth.json (WIDEX_SAVED_API_KEYS),
        # so after one successful switch you can unset the env var.
        openai_api_key:
          env: XAI_API_KEY

    # Example: switch to a user-defined proxy provider.
    # This provider_id must exist under `[model_providers]` in config.toml.
    # openai-proxy:
    #   name: OpenAI (proxy)
    #   provider_id: openai-proxy
    #   auth:
    #     openai_api_key:
    #       env: OPENAI_API_KEY

  # Exact model slug mapping (highest priority).
  models: {}

  # Ordered prefix/equals rules (first match wins).
  rules:
    - match:
        equals: "grok-4-1-fast-reasoning"
      use: grok-xai
    - match:
        equals: "grok-4-1-fast-non-reasoning"
      use: grok-xai
    - match:
        prefix: "gemini-"
      use: gemini-official
    - match:
        prefix: "grok-"
      use: grok-vectorengine
    - match:
        prefix: "gpt-"
      use: openai-official

  # Fallback when nothing matches.
  default_profile: openai-official
