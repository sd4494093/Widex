name: widex-npm-artifacts

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to write into staged npm packages, e.g. 0.128.4 or 0.128.4-test.0"
        required: true
        type: string
  push:
    branches:
      - widex
    paths:
      - ".github/workflows/widex-npm-artifacts.yml"
      - "codex-cli/**"
      - "codex-rs/**"
      - "widex-custom/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-unix:
    name: Build native artifact - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libcap-dev \
            libubsan1 \
            pkg-config \
            zstd

      - name: Install zstd on macOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Use hermetic Cargo home for musl
        if: ${{ endsWith(matrix.target, '-musl') }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig for musl
        if: ${{ endsWith(matrix.target, '-musl') }}
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: ${{ endsWith(matrix.target, '-musl') }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper for musl
        if: ${{ endsWith(matrix.target, '-musl') }}
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags for musl
        if: ${{ endsWith(matrix.target, '-musl') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides
        if: ${{ endsWith(matrix.target, '-musl') }}
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.target }}

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          bins=(--bin codex)
          if [[ "${{ matrix.target }}" == *linux* ]]; then
            bins+=(--bin bwrap)
          fi
          cargo_build() {
            cargo build --target ${{ matrix.target }} --release --timings "${bins[@]}"
          }

          for attempt in 1 2 3; do
            if cargo_build; then
              exit 0
            fi
            status=$?
            if [[ "$attempt" == 3 ]]; then
              exit "$status"
            fi
            sleep_for=$((attempt * 30))
            echo "cargo build failed with status ${status}; retrying in ${sleep_for}s..."
            sleep "$sleep_for"
          done

      - name: Stage native artifact
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/codex" "$dest/codex-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *linux* ]]; then
            cp "target/${{ matrix.target }}/release/bwrap" "$dest/bwrap-${{ matrix.target }}"
          fi
          for f in "$dest"/*; do
            zstd -T0 -19 --rm "$f"
          done

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: codex-rs/dist/${{ matrix.target }}/*

  build-windows:
    name: Build native artifact - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: thin

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Cargo build
        shell: bash
        run: |
          set -euo pipefail
          cargo_build() {
            cargo build --target ${{ matrix.target }} --release --timings \
              --bin codex \
              --bin codex-windows-sandbox-setup \
              --bin codex-command-runner
          }

          for attempt in 1 2 3; do
            if cargo_build; then
              exit 0
            fi
            status=$?
            if [[ "$attempt" == 3 ]]; then
              exit "$status"
            fi
            sleep_for=$((attempt * 30))
            echo "cargo build failed with status ${status}; retrying in ${sleep_for}s..."
            sleep "$sleep_for"
          done

      - name: Stage native artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/codex.exe" "$dest/codex-${{ matrix.target }}.exe"
          cp "target/${{ matrix.target }}/release/codex-windows-sandbox-setup.exe" "$dest/codex-windows-sandbox-setup-${{ matrix.target }}.exe"
          cp "target/${{ matrix.target }}/release/codex-command-runner.exe" "$dest/codex-command-runner-${{ matrix.target }}.exe"

      - name: Install DotSlash for zstd
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2

      - name: Compress native artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          for f in "$dest"/*.exe; do
            "${GITHUB_WORKSPACE}/.github/workflows/zstd" -T0 -19 "$f"
            rm "$f"
          done

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.target }}
          path: codex-rs/dist/${{ matrix.target }}/*

  stage-npm:
    name: Stage npm tarballs
    needs:
      - build-unix
      - build-windows
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install packaging tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends zstd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage npm packages
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event.inputs.release_version || '0.128.4-test.0' }}
        run: |
          set -euo pipefail
          ./scripts/stage_npm_packages.py \
            --release-version "$RELEASE_VERSION" \
            --workflow-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --package widex

      - name: List staged npm tarballs
        run: ls -lh dist/npm

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: widex-npm-tarballs-${{ inputs.release_version }}
          path: dist/npm/*.tgz
